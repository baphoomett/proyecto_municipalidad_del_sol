# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# MinIO
minio.endpoint=http://localhost:9000
minio.accessKey=minio
minio.secretKey=minio123
minio.bucket=evidencias

# Resilience4j defaults
resilience4j.retry.instances.minio.max-attempts=3
resilience4j.retry.instances.minio.wait-duration=500ms
resilience4j.circuitbreaker.instances.minio.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.minio.sliding-window-size=10

# Server
server.port=8090
spring.application.name=ms_integracion

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect