# ms_alertas configuration
server.port=8083

# Database (override via env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/ms_alertas_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}

# Mail settings can be configured via environment in production
#spring.mail.host=smtp.example.com
#spring.mail.port=587
#spring.mail.username=
#spring.mail.password=
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# Resilience4j defaults
resilience4j.retry.instances.alertsRetry.max-attempts=3
resilience4j.retry.instances.alertsRetry.wait-duration=500ms
resilience4j.circuitbreaker.instances.alertsCircuit.register-health-indicator=true
resilience4j.circuitbreaker.instances.alertsCircuit.sliding-window-size=10
resilience4j.circuitbreaker.instances.alertsCircuit.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.alertsCircuit.failure-rate-threshold=50
spring.application.name=ms_alertas
