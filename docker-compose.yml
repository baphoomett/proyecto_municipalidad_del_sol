
services:
  postgres_ms_usuarios:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_usuarios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.2
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  ms_usuarios:
    image: maxxito/ms_usuarios:latest
    build:
      context: ./ms_usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_usuarios:5432/ms_usuarios_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: changeitchangethischangethisisverysecretkeyforjwthmacsha256algorithm
    depends_on:
      postgres_ms_usuarios:
        condition: service_healthy
    ports:
      - "8084:8080"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.10
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  postgres_ms_reportes:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_reportes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_reportes:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  ms_reportes:
    image: maxxito/ms_reportes:latest
    build:
      context: ./ms_reportes
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_reportes:5432/ms_reportes_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      FILE_UPLOAD_DIR: /data/uploads
      JWT_SECRET: changeitchangethischangethisisverysecretkeyforjwthmacsha256algorithm
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres_ms_reportes:
        condition: service_healthy
    ports:
      - "8081:8080"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  postgres_ms_monitoreo:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ms_monitoreo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_monitoreo:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.7
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ms_monitoreo:
    image: maxxito/ms_monitoreo:latest
    build:
      context: ./ms_monitoreo
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_monitoreo:5432/ms_monitoreo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: changeitchangethischangethisisverysecret
      SPRING_FLYWAY_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres_ms_monitoreo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8182:8080"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.12
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  postgres_ms_alertas:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_alertas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_alertas:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.6

  ms_alertas:
    image: maxxito/ms_alertas:latest
    build:
      context: ./ms_alertas
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_alertas:5432/ms_alertas_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: maxibrocklestt7@gmail.com
      SPRING_MAIL_PASSWORD: trfgcxcgugpxoqhv
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      ALERT_EMAIL_TO: maxibrocklestt7@gmail.com,be.morenop@duocuc.cl
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres_ms_alertas:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "8083:8083"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.13
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8083' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.15
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9000' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms_integracion:
    image: maxxito/ms_integracion:latest
    build:
      context: ./ms_integracion
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESSKEY: minioadmin
      MINIO_SECRETKEY: minioadmin
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8090:8090"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.14
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8090' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  api_gateway:
    image: maxxito/api_gateway:latest
    build:
      context: ./api_gateway
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8085
      SPRING_CLOUD_GATEWAY_HTTPCLIENT_SSL_USEINSECURETRUSTMANAGER: "true"
      JVM_OPTS: "-Djava.net.preferIPv4Stack=true"
    depends_on:
      ms_usuarios:
        condition: service_healthy
      ms_reportes:
        condition: service_healthy
      ms_monitoreo:
        condition: service_healthy
      ms_alertas:
        condition: service_healthy
      ms_integracion:
        condition: service_healthy
    ports:
      - "8085:8085"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.20
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8085' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  bff:
    image: maxxito/bff:latest
    build:
      context: ./bff
    environment:
      SPRING_APPLICATION_NAME: bff
      SERVER_PORT: 8086
      API_GATEWAY_URL: http://172.28.0.20:8085
      JWT_SECRET: changeitchangethischangethisisverysecretkeyforjwthmacsha256algorithm
    depends_on:
      api_gateway:
        condition: service_healthy
    ports:
      - "8086:8086"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.21
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8086' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    image: maxxito/frontend:latest
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    depends_on:
      bff:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      municipalidad_net:
        ipv4_address: 172.28.0.22

volumes:
  pgdata_usuarios:
  pgdata_reportes:
  uploads:
  pgdata_alertas:
  pgdata_monitoreo:
  minio_data:

networks:
  municipalidad_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16