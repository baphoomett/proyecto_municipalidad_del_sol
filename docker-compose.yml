
services:
  postgres_ms_usuarios:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_usuarios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.2

  ms_usuarios:
    build:
      context: ./ms_usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_usuarios:5432/ms_usuarios_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: changeitchangethischangethisisverysecretkeyforjwthmacsha256algorithm
    depends_on:
      - postgres_ms_usuarios
    ports:
      - "8084:8080"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.10

  postgres_ms_reportes:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_reportes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_reportes:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.3

  ms_reportes:
    build:
      context: ./ms_reportes
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_reportes:5432/ms_reportes_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      FILE_UPLOAD_DIR: /data/uploads
      JWT_SECRET: changeitchangethischangethisisverysecretkeyforjwthmacsha256algorithm
    volumes:
      - uploads:/data/uploads
    depends_on:
      - postgres_ms_reportes
    ports:
      - "8081:8080"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.11

  postgres_ms_monitoreo:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ms_monitoreo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_monitoreo:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.4

  ms_monitoreo:
    build:
      context: ./ms_monitoreo
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_monitoreo:5432/ms_monitoreo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: changeitchangethischangethisisverysecret
      SPRING_FLYWAY_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres_ms_monitoreo
    ports:
      - "8182:8080"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.12

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.7

  postgres_ms_alertas:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_alertas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_alertas:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.5

  ms_alertas:
    build:
      context: ./ms_alertas
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_alertas:5432/ms_alertas_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: maxibrocklestt7@gmail.com
      SPRING_MAIL_PASSWORD: trfgcxcgugpxoqhv
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      ALERT_EMAIL_TO:  maxibrocklestt7@gmail.com,be.morenop@duocuc.cl
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - postgres_ms_alertas
      - rabbitmq
      - mailhog
    ports:
      - "8083:8080"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.13

  ms_integracion:
    build:
      context: ./ms_integracion
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESSKEY: minioadmin
      MINIO_SECRETKEY: minioadmin
    depends_on:
      - rabbitmq
    ports:
      - "8090:8090"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.14

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.6

  api_gateway:
    build:
      context: ./api_gateway
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8085
      SPRING_CLOUD_GATEWAY_HTTPCLIENT_SSL_USEINSECURETRUSTMANAGER: "true"
      JVM_OPTS: "-Djava.net.preferIPv4Stack=true"
    dns:
      - 127.0.0.11
    depends_on:
      - ms_usuarios
      - ms_reportes
      - ms_monitoreo
      - ms_alertas
      - ms_integracion
    ports:
      - "8085:8085"
    networks:
      municipalidad_net:
        ipv4_address: 172.20.0.20


  bff:
      build:
        context: ./bff
      environment:
        SPRING_APPLICATION_NAME: bff
        SERVER_PORT: 8086
        API_GATEWAY_URL: http://172.20.0.20:8085
        JWT_SECRET: changeitchangethischangethisisverysecretkeyforjwthmacsha256algorithm
      depends_on:
        - api_gateway
      ports:
        - "8086:8086"
      networks:
        municipalidad_net:
          ipv4_address: 172.20.0.21

volumes:
  pgdata_usuarios:
  pgdata_reportes:
  uploads:
  pgdata_alertas:
  pgdata_monitoreo:

networks:
  municipalidad_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
