version: '3.8'
services:
  postgres_ms_usuarios:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_usuarios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ms_usuarios:
    build:
      context: ./ms_usuarios
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_usuarios:5432/ms_usuarios_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: changeitchangethischangethisisverysecret
    depends_on:
      - postgres_ms_usuarios
    ports:
      - "8084:8080"

  postgres_ms_reportes:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_reportes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_reportes:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  ms_reportes:
    build:
      context: ./ms_reportes
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_reportes:5432/ms_reportes_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      FILE_UPLOAD_DIR: /data/uploads
      JWT_SECRET: changeitchangethischangethisisverysecret
    volumes:
      - uploads:/data/uploads
    depends_on:
      - postgres_ms_reportes
    ports:
      - "8081:8080"

  postgres_ms_monitoreo:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: ms_monitoreo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_monitoreo:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  ms_monitoreo:
    build:
      context: ./ms_monitoreo
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_monitoreo:5432/ms_monitoreo_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: changeitchangethischangethisisverysecret
      SPRING_FLYWAY_ENABLED: "true"
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - postgres_ms_monitoreo
    ports:
      - "8082:8080"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres_ms_alertas:
    image: postgres:15
    environment:
      POSTGRES_DB: ms_alertas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata_alertas:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  ms_alertas:
    build:
      context: ./ms_alertas
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_ms_alertas:5432/ms_alertas_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      # MailHog for local SMTP capture
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
    depends_on:
      - postgres_ms_alertas
      - rabbitmq
      - mailhog
    ports:
      - "8083:8080"

  ms_integracion:
    build:
      context: ./ms_integracion
    environment:
      RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_HOST: rabbitmq
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESSKEY: minioadmin
      MINIO_SECRETKEY: minioadmin
    depends_on:
      - rabbitmq
    ports:
      - "8090:8090"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  pgdata_usuarios:
  pgdata_reportes:
  uploads:
  pgdata_alertas:
  pgdata_monitoreo:
