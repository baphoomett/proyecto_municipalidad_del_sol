spring.application.name=ms_monitoreo

# Postgres datasource (can be overridden by env SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ms_monitoreo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway migrations (enable only when using a Postgres/PostGIS database)
# Default disabled to avoid running Postgres-specific migrations on H2 or other DBs.
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration

# JWT secret used to validate tokens issued by ms_usuarios or service tokens (can be provided via JWT_SECRET env var)
jwt.secret=${JWT_SECRET:${jwt.secret:changeitchangethis}}

# Hibernate spatial dialect (PostGIS)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

